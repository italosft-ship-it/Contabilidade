<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin simples | Beer Store</title><style>body{font-family:Arial,sans-serif;background:#fff7e8;margin:0;padding:20px;color:#221}textarea{width:100%;height:70vh;border:1px solid #ddd;border-radius:12px;padding:12px;font-family:monospace}button{background:#f5b91f;border:0;border-radius:10px;padding:12px 18px;font-weight:800} .wrap{max-width:980px;margin:auto}</style></head><body><div class="wrap"><h1>Admin simples - produtos.json</h1><p>Edite abaixo e clique em baixar. Depois substitua o arquivo <b>produtos.json</b> no GitHub.</p><textarea id="txt"></textarea><br><br><button onclick="baixar()">Baixar produtos.json atualizado</button></div><script>fetch('produtos.json').then(r=>r.text()).then(t=>txt.value=t);function baixar(){const blob=new Blob([txt.value],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='produtos.json';a.click();}</script></body></html>
